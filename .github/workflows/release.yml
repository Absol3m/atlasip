name: Build & Release AtlasIP

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # Windows build
  # ──────────────────────────────────────────────
  build-windows:
    name: Build – Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install Node dependencies
        working-directory: ui
        run: npm ci

      - name: Build Tauri app
        working-directory: ui
        run: npm run tauri -- build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atlasip-windows
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          if-no-files-found: warn

  # ──────────────────────────────────────────────
  # macOS ARM64 build (macos-latest = Apple Silicon)
  # ──────────────────────────────────────────────
  build-macos:
    name: Build – macOS ARM64
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install Node dependencies
        working-directory: ui
        run: npm ci

      - name: Build Tauri app
        working-directory: ui
        run: npm run tauri -- build

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atlasip-macos
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

  # ──────────────────────────────────────────────
  # Linux AppImage build
  # ──────────────────────────────────────────────
  build-linux:
    name: Build – Linux (AppImage)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install Node dependencies
        working-directory: ui
        run: npm ci

      - name: Build Tauri app (AppImage only)
        working-directory: ui
        run: npm run tauri -- build --bundles appimage

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atlasip-linux
          path: target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Publish: attach all artifacts to the GitHub release
  # Only runs on tag pushes (not workflow_dispatch)
  # ──────────────────────────────────────────────
  publish:
    name: Publish Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AtlasIP ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: artifacts/**/*
